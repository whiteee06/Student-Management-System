<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements - AI&DS SMS</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="/assets/firebase/config.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/toast.js"></script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/notifications.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    let achievements = [];

    initDashboard('student', 'achievements');
    setTimeout(loadAchievements, 400);

    async function loadAchievements() {
      try { achievements = await DB.getAll('achievements', [DB.orderBy('createdAt', 'desc')]); }
      catch (e) { achievements = []; }
      renderPage();
    }

    function getAchievementIcon(type) {
      const icons = { academic: '&#127891;', sports: '&#9917;', cultural: '&#127942;', technical: '&#128187;', research: '&#128300;', leadership: '&#128081;', community: '&#127760;', other: '&#127942;' };
      return icons[(type || '').toLowerCase()] || '&#127942;';
    }

    function getAchievementColor(type) {
      const colors = { academic: 'var(--gradient-primary)', sports: 'var(--gradient-success)', cultural: 'var(--gradient-warning)', technical: 'var(--gradient-accent)', research: 'var(--gradient-purple)', leadership: 'linear-gradient(135deg, #F59E0B, #EF4444)', community: 'linear-gradient(135deg, #22C55E, #06B6D4)', other: 'var(--gradient-primary)' };
      return colors[(type || '').toLowerCase()] || 'var(--gradient-primary)';
    }

    function renderPage() {
      const content = `
        ${Components.pageHeader('Achievements', `${achievements.length} achievements`, '')}

        <div class="grid grid-2" style="gap:20px">
          ${achievements.length ? achievements.map((a, i) => `
            <div class="card animate-fade-in-up" style="padding:0;overflow:hidden">
              <div style="height:8px;background:${getAchievementColor(a.type)}"></div>
              <div style="padding:24px">
                <div class="flex items-center gap-3 mb-3">
                  <div style="width:48px;height:48px;border-radius:var(--radius-md);background:${getAchievementColor(a.type)};display:flex;align-items:center;justify-content:center;font-size:24px;color:white;flex-shrink:0">${getAchievementIcon(a.type)}</div>
                  <div>
                    <div class="flex items-center gap-2">
                      <span class="badge badge-primary">${Utils.escapeHtml(a.type || 'Achievement')}</span>
                      ${a.date ? `<span style="font-size:var(--font-size-xs);color:var(--text-secondary)">${Utils.formatDate(a.date)}</span>` : ''}
                    </div>
                    <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-top:4px">${Utils.escapeHtml(a.title)}</h3>
                  </div>
                </div>
                <p style="font-size:var(--font-size-sm);color:var(--text-secondary);line-height:1.6;margin-bottom:12px">${Utils.escapeHtml(a.description || '')}</p>
                ${a.studentName ? `<p style="font-size:var(--font-size-xs);color:var(--text-tertiary)">Student: ${Utils.escapeHtml(a.studentName)}</p>` : ''}
                ${a.awardedBy ? `<p style="font-size:var(--font-size-xs);color:var(--text-tertiary)">Awarded by: ${Utils.escapeHtml(a.awardedBy)}</p>` : ''}
              </div>
            </div>
          `).join('') : `<div style="grid-column:1/-1">${Components.emptyState('&#127942;', 'No Achievements', 'No achievements recorded yet.')}</div>`}
        </div>
      `;
      loadPageContent(content);
    }
  </script>
</body>
</html>
