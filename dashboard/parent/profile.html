<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Profile - AI&DS SMS</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../../assets/firebase/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/components.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    initDashboard('parent', 'profile');
    setTimeout(loadProfile, 400);

    async function loadProfile() {
      const user = Auth.getCurrentUser();
      if (!user) return;
      let profileData = {};
      try {
        const results = await DB.getAll('parents', [DB.where('uid', '==', user.uid)]);
        profileData = results[0] || {};
      } catch (e) {}

      const content = `
        ${Components.pageHeader('Parent Profile', 'Manage your account', '')}
        <div class="grid grid-2" style="gap:24px">
          <div class="card animate-fade-in-up">
            <div class="flex items-center gap-4 mb-5">
              <div class="avatar avatar-xl avatar-placeholder" style="font-size:28px" id="profileAvatar">${Utils.getInitials(profileData.name || user.displayName || user.email)}</div>
              <div>
                <h2 style="font-size:var(--font-size-xl);font-weight:var(--font-bold)">${Utils.escapeHtml(profileData.name || user.displayName || 'Parent')}</h2>
                <p style="color:var(--text-secondary);font-size:var(--font-size-sm)">${Utils.escapeHtml(user.email)}</p>
                <span class="badge badge-primary" style="margin-top:4px">Parent</span>
              </div>
            </div>
            <form id="profileForm" onsubmit="updateProfile(event)">
              <div class="grid grid-2" style="gap:12px">
                <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="pName" value="${Utils.escapeHtml(profileData.name || user.displayName || '')}"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="${Utils.escapeHtml(profileData.email || user.email || '')}" readonly style="opacity:0.6"></div>
                <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="pPhone" value="${Utils.escapeHtml(profileData.phone || '')}"></div>
                <div class="form-group"><label class="form-label">Occupation</label><input type="text" class="form-input" id="pOccupation" value="${Utils.escapeHtml(profileData.occupation || '')}"></div>
              </div>
              <div class="form-group"><label class="form-label">Address</label><textarea class="form-input form-textarea" id="pAddress" rows="2">${Utils.escapeHtml(profileData.address || '')}</textarea></div>
              <button type="submit" class="btn btn-primary" style="margin-top:12px">Save Changes</button>
            </form>
          </div>
          <div class="card animate-fade-in-up stagger-1">
            <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-bottom:16px">Change Password</h3>
            <form onsubmit="changePassword(event)">
              <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="newPass" required minlength="6"></div>
              <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-input" id="confirmPass" required></div>
              <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
            <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
              <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-bottom:12px">Account Info</h3>
              <div style="font-size:var(--font-size-sm);color:var(--text-secondary)">
                <p style="margin-bottom:8px"><strong>Role:</strong> Parent</p>
                <p style="margin-bottom:8px"><strong>Joined:</strong> ${Utils.formatDateTime(profileData.createdAt) || 'N/A'}</p>
                <p><strong>Child Reg. No:</strong> ${profileData.childRegisterNumber || profileData.childRegNo || 'N/A'}</p>
              </div>
            </div>
          </div>
        </div>
      `;
      loadPageContent(content);
    }

    async function updateProfile(e) {
      e.preventDefault();
      const user = Auth.getCurrentUser();
      if (!user) return;
      try {
        const results = await DB.getAll('parents', [DB.where('uid', '==', user.uid)]);
        const data = {
          name: Utils.sanitize(document.getElementById('pName').value),
          phone: document.getElementById('pPhone')?.value.trim() || '',
          occupation: Utils.sanitize(document.getElementById('pOccupation')?.value || ''),
          address: Utils.sanitize(document.getElementById('pAddress')?.value || '')
        };
        if (results.length) {
          await DB.update('parents', results[0].id, data);
        }
        await user.updateProfile({ displayName: data.name });
        Toast.success('Updated', 'Profile updated successfully');
        document.getElementById('sidebarUserName').textContent = data.name;
        document.getElementById('sidebarAvatar').textContent = Utils.getInitials(data.name);
      } catch (e) { Toast.error('Error', e.message); }
    }

    async function changePassword(e) {
      e.preventDefault();
      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;
      if (newPass !== confirmPass) { Toast.error('Mismatch', 'Passwords do not match'); return; }
      try {
        await Auth.updatePassword(newPass);
        Toast.success('Updated', 'Password changed successfully');
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
      } catch (e) {
        Toast.error('Error', e.code === 'auth/requires-recent-login' ? 'Please log out and log in again before changing password.' : e.message);
      }
    }
  </script>
</body>
</html>
