<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices - AI&DS SMS</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../../assets/firebase/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/components.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    let allNotices = [];
    let filteredNotices = [];
    let activeFilter = '';

    initDashboard('parent', 'notices');
    setTimeout(loadNotices, 400);

    async function loadNotices() {
      try {
        allNotices = await DB.getAll('notices', [DB.orderBy('date', 'desc')]);
      } catch (e) { allNotices = []; }
      filteredNotices = [...allNotices];
      renderPage();
    }

    function getTypeColor(type) {
      const colors = { circular: 'badge-primary', seminar: 'badge-accent', workshop: 'badge-warning', placement: 'badge-success', event: 'badge-primary', general: 'badge-danger', holiday: 'badge-success' };
      return colors[(type || '').toLowerCase()] || 'badge-primary';
    }

    function renderPage() {
      const types = [...new Set(allNotices.map(n => n.type).filter(Boolean))];
      const gradients = ['var(--gradient-primary)', 'var(--gradient-accent)', 'var(--gradient-success)', 'var(--gradient-purple)', 'var(--gradient-warning)'];

      const content = `
        ${Components.pageHeader('Department Notices', `${filteredNotices.length} notices`, '')}

        <div class="flex gap-2 mb-6" style="flex-wrap:wrap">
          <button class="btn btn-sm ${!activeFilter ? 'btn-primary' : 'btn-outline'}" onclick="filterNotices('')">All</button>
          ${types.map(t => `<button class="btn btn-sm ${activeFilter === t ? 'btn-primary' : 'btn-outline'}" onclick="filterNotices('${t}')">${Utils.escapeHtml(t)}</button>`).join('')}
        </div>

        <div class="grid grid-2" style="gap:20px">
          ${filteredNotices.length ? filteredNotices.map((n, i) => `
            <div class="card animate-fade-in-up" style="padding:0;overflow:hidden">
              <div style="height:8px;background:${gradients[i % gradients.length]}"></div>
              <div style="padding:24px">
                <div class="flex items-center gap-2 mb-3">
                  <span class="badge ${getTypeColor(n.type)}">${Utils.escapeHtml(n.type || 'General')}</span>
                  <span style="font-size:var(--font-size-xs);color:var(--text-secondary)">&#128197; ${Utils.formatDate(n.date) || 'TBA'}</span>
                </div>
                <h3 style="font-size:var(--font-size-lg);font-weight:var(--font-semibold);margin-bottom:8px">${Utils.escapeHtml(n.title)}</h3>
                <p style="font-size:var(--font-size-sm);color:var(--text-secondary);line-height:1.6">${Utils.escapeHtml(n.description || '')}</p>
                ${n.important ? '<div style="margin-top:12px"><span class="badge badge-danger">Important</span></div>' : ''}
                ${n.publishedBy ? `<p style="font-size:var(--font-size-xs);color:var(--text-tertiary);margin-top:12px">Published by: ${Utils.escapeHtml(n.publishedBy)}</p>` : ''}
              </div>
            </div>
          `).join('') : `<div style="grid-column:1/-1">${Components.emptyState('&#128196;', 'No Notices', 'No notices available yet.')}</div>`}
        </div>
      `;
      loadPageContent(content);
    }

    function filterNotices(type) {
      activeFilter = type;
      filteredNotices = type ? allNotices.filter(n => n.type === type) : [...allNotices];
      renderPage();
    }
  </script>
</body>
</html>
