<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Child Attendance - AI&DS SMS</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../../assets/firebase/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script src="../../assets/js/charts.js"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/components.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    let childData = null;
    let attendanceRecords = [];
    let filteredRecords = [];

    initDashboard('parent', 'attendance');
    setTimeout(loadData, 400);

    async function loadData() {
      const user = Auth.getCurrentUser();
      if (!user) return;
      try {
        const userDoc = await DB.get('users', user.uid);
        const linkedStudentId = userDoc?.linkedStudentId;

        if (linkedStudentId) {
          childData = await DB.get('students', linkedStudentId);
        }

        if (!childData) {
          const parents = await DB.getAll('parents', [DB.where('uid', '==', user.uid)]);
          if (parents.length && parents[0].linkedStudentId) {
            childData = await DB.get('students', parents[0].linkedStudentId);
          }
        }

        if (!childData) {
          const parentData = (await DB.getAll('parents', [DB.where('uid', '==', user.uid)]))[0] || {};
          if (parentData.phone) {
            const students = await DB.getAll('students', [DB.where('parentPhone', '==', parentData.phone)]);
            childData = students[0] || null;
          }
        }

        if (childData) {
          attendanceRecords = await DB.getAll('attendance', [DB.where('studentId', '==', childData.id), DB.orderBy('date', 'desc')]);
        }
      } catch (e) { attendanceRecords = []; }
      filteredRecords = [...attendanceRecords];
      renderPage();
    }

    function renderPage() {
      if (!childData) {
        loadPageContent(Components.emptyState('&#128100;', 'No Child Found', 'No child profile linked to your account.'));
        return;
      }

      const totalDays = attendanceRecords.length;
      const presentDays = attendanceRecords.filter(a => a.status === 'present').length;
      const absentDays = attendanceRecords.filter(a => a.status === 'absent').length;
      const lateDays = attendanceRecords.filter(a => a.status === 'late').length;
      const attPerc = totalDays > 0 ? Math.round((presentDays / totalDays) * 100) : 0;

      const monthlyData = {};
      attendanceRecords.forEach(a => {
        const month = (a.date || '').substring(0, 7);
        if (!month) return;
        if (!monthlyData[month]) monthlyData[month] = { present: 0, total: 0 };
        monthlyData[month].total++;
        if (a.status === 'present') monthlyData[month].present++;
      });

      const monthLabels = Object.keys(monthlyData).sort().slice(-6);
      const monthPercs = monthLabels.map(m => monthlyData[m].total ? Math.round((monthlyData[m].present / monthlyData[m].total) * 100) : 0);
      const monthDisplayLabels = monthLabels.map(m => {
        const [year, month] = m.split('-');
        const names = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return names[parseInt(month)] + ' ' + year;
      });

      const content = `
        ${Components.pageHeader(`Attendance - ${Utils.escapeHtml(childData.name)}`, `${totalDays} records`, '')}

        <div class="grid grid-4 mb-6">
          ${Components.statCard('&#9745;', totalDays, 'Total Days', 'primary', 0)}
          ${Components.statCard('&#10004;', presentDays, 'Present', 'success', 100)}
          ${Components.statCard('&#10006;', absentDays, 'Absent', 'danger', 200)}
          ${Components.statCard('&#128200;', attPerc + '%', 'Attendance %', 'warning', 300)}
        </div>

        <div class="grid grid-2 mb-6">
          <div class="card animate-fade-in-up stagger-2">
            <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-bottom:16px">Attendance Distribution</h3>
            <div style="height:260px;position:relative"><canvas id="attDistChart"></canvas></div>
          </div>
          <div class="card animate-fade-in-up stagger-3">
            <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-bottom:16px">Monthly Trend</h3>
            <div style="height:260px;position:relative"><canvas id="monthlyChart"></canvas></div>
          </div>
        </div>

        <div class="card animate-fade-in-up stagger-4" style="padding:0;overflow:hidden">
          <div style="padding:20px;border-bottom:1px solid var(--border)">
            <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold)">Attendance Records</h3>
          </div>
          <div class="table-container" style="border:none">
            <table class="table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Subject</th>
                </tr>
              </thead>
              <tbody>
                ${filteredRecords.length ? filteredRecords.slice(0, 30).map(a => `
                  <tr>
                    <td>${Utils.formatDate(a.date) || 'N/A'}</td>
                    <td>
                      <span class="badge ${a.status === 'present' ? 'badge-success' : a.status === 'absent' ? 'badge-danger' : a.status === 'late' ? 'badge-warning' : 'badge-primary'}">
                        ${Utils.capitalize(a.status || 'N/A')}
                      </span>
                    </td>
                    <td style="font-size:var(--font-size-sm)">${Utils.escapeHtml(a.subject || 'N/A')}</td>
                  </tr>
                `).join('') : `<tr><td colspan="3">${Components.emptyState('&#9745;', 'No Records', 'No attendance records found.')}</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
      loadPageContent(content);

      setTimeout(() => {
        Charts.attendanceChart('attDistChart', presentDays, absentDays, lateDays);

        if (monthLabels.length) {
          Charts.create('monthlyChart', {
            type: 'line',
            data: {
              labels: monthDisplayLabels,
              datasets: [{
                label: 'Attendance %',
                data: monthPercs,
                borderColor: '#2563EB',
                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#2563EB',
                pointRadius: 4
              }]
            },
            options: { ...Charts.getDefaults(), plugins: { legend: { display: false } }, scales: { ...Charts.getDefaults().scales, y: { ...Charts.getDefaults().scales.y, min: 0, max: 100 } } }
          });
        }
      }, 100);
    }
  </script>
</body>
</html>
