<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - AI&DS SMS</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../../assets/firebase/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/components.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    initDashboard('parent', 'password');
    setTimeout(renderPage, 300);

    function renderPage() {
      const user = Auth.getCurrentUser();
      const content = `
        ${Components.pageHeader('Change Password', 'Update your account password', '')}

        <div class="grid grid-2" style="gap:24px;max-width:800px">
          <div class="card animate-fade-in-up">
            <div class="flex items-center gap-4 mb-5">
              <div class="avatar avatar-xl avatar-placeholder" style="font-size:28px">&#128274;</div>
              <div>
                <h2 style="font-size:var(--font-size-xl);font-weight:var(--font-bold)">Password Settings</h2>
                <p style="color:var(--text-secondary);font-size:var(--font-size-sm)">${Utils.escapeHtml(user?.email || '')}</p>
              </div>
            </div>
            <form onsubmit="changePassword(event)">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="currentPass" required placeholder="Enter current password">
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPass" required minlength="6" placeholder="Minimum 6 characters">
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" id="confirmPass" required placeholder="Re-enter new password">
              </div>
              <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Update Password</button>
            </form>
          </div>
          <div class="card animate-fade-in-up stagger-1">
            <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold);margin-bottom:16px">Password Requirements</h3>
            <div style="font-size:var(--font-size-sm);color:var(--text-secondary);line-height:2">
              <div class="flex items-center gap-2">&#10004; Minimum 6 characters</div>
              <div class="flex items-center gap-2">&#10004; Use a strong, unique password</div>
              <div class="flex items-center gap-2">&#10004; Mix uppercase and lowercase letters</div>
              <div class="flex items-center gap-2">&#10004; Include numbers and special characters</div>
              <div class="flex items-center gap-2">&#10004; Do not share your password</div>
            </div>
            <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
              <p style="font-size:var(--font-size-xs);color:var(--text-tertiary)">For security, you may be asked to log in again after changing your password.</p>
            </div>
          </div>
        </div>
      `;
      loadPageContent(content);
    }

    async function changePassword(e) {
      e.preventDefault();
      const currentPass = document.getElementById('currentPass').value;
      const newPass = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;

      if (newPass !== confirmPass) { Toast.error('Mismatch', 'New passwords do not match'); return; }
      if (newPass.length < 6) { Toast.warning('Too Short', 'Password must be at least 6 characters'); return; }
      if (currentPass === newPass) { Toast.warning('Same Password', 'New password must be different from current'); return; }

      try {
        const user = Auth.getCurrentUser();
        if (!user) return;
        const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPass);
        await user.reauthenticateWithCredential(credential);
        await user.updatePassword(newPass);
        Toast.success('Updated', 'Password changed successfully');
        document.getElementById('currentPass').value = '';
        document.getElementById('newPass').value = '';
        document.getElementById('confirmPass').value = '';
      } catch (e) {
        let msg = e.message;
        if (e.code === 'auth/wrong-password') msg = 'Current password is incorrect';
        if (e.code === 'auth/requires-recent-login') msg = 'Please log out and log in again before changing password';
        Toast.error('Error', msg);
      }
    }
  </script>
</body>
</html>
