<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices - AI&DS SMS</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../../assets/firebase/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/toast.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/db.js"></script>
  <script src="../../assets/js/notifications.js"></script>
  <script src="../../assets/js/components.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    let allNotices = [];
    let filteredNotices = [];
    let activeFilter = '';

    initDashboard('faculty', 'notices');
    setTimeout(loadNotices, 400);

    async function loadNotices() {
      try { allNotices = await DB.getAll('notices', [DB.orderBy('date', 'desc')]); }
      catch (e) { allNotices = []; }
      filteredNotices = [...allNotices];
      renderPage();
    }

    function getTypeIcon(type) {
      const icons = { circular: '&#128196;', seminar: '&#128188;', workshop: '&#128295;', placement: '&#128188;', event: '&#127891;', general: '&#128221;', holiday: '&#127874;' };
      return icons[(type || '').toLowerCase()] || '&#128196;';
    }

    function getTypeColor(type) {
      const colors = { circular: 'badge-primary', seminar: 'badge-accent', workshop: 'badge-warning', placement: 'badge-success', event: 'badge-primary', general: 'badge-danger', holiday: 'badge-success' };
      return colors[(type || '').toLowerCase()] || 'badge-primary';
    }

    function renderPage() {
      const types = [...new Set(allNotices.map(n => n.type).filter(Boolean))];
      const gradients = ['var(--gradient-primary)', 'var(--gradient-accent)', 'var(--gradient-success)', 'var(--gradient-purple)', 'var(--gradient-warning)'];

      const content = `
        ${Components.pageHeader('Notice Board', `${filteredNotices.length} notices`, `
          <button class="btn btn-primary btn-sm" onclick="showAddNotice()">+ Add Notice</button>
        `)}

        <div class="flex gap-2 mb-6" style="flex-wrap:wrap">
          <button class="btn btn-sm ${!activeFilter ? 'btn-primary' : 'btn-outline'}" onclick="filterNotices('')">All</button>
          ${types.map(t => `<button class="btn btn-sm ${activeFilter === t ? 'btn-primary' : 'btn-outline'}" onclick="filterNotices('${t}')">${Utils.escapeHtml(t)}</button>`).join('')}
        </div>

        <div class="grid grid-2" style="gap:20px">
          ${filteredNotices.length ? filteredNotices.map((n, i) => `
            <div class="card animate-fade-in-up" style="padding:0;overflow:hidden">
              <div style="height:8px;background:${gradients[i % gradients.length]}"></div>
              <div style="padding:24px">
                <div class="flex items-center gap-2 mb-3">
                  <span class="badge ${getTypeColor(n.type)}">${Utils.escapeHtml(n.type || 'General')}</span>
                  <span style="font-size:var(--font-size-xs);color:var(--text-secondary)">&#128197; ${Utils.formatDate(n.date) || 'TBA'}</span>
                </div>
                <h3 style="font-size:var(--font-size-lg);font-weight:var(--font-semibold);margin-bottom:8px">${Utils.escapeHtml(n.title)}</h3>
                <p style="font-size:var(--font-size-sm);color:var(--text-secondary);margin-bottom:16px;line-height:1.6">${Utils.escapeHtml(n.description || '')}</p>
                ${n.important ? '<div style="margin-bottom:12px"><span class="badge badge-danger">Important</span></div>' : ''}
                <div class="flex gap-2">
                  <button class="btn btn-ghost btn-sm" onclick="editNotice('${n.id}')">&#9998; Edit</button>
                  <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteNotice('${n.id}','${Utils.escapeHtml(n.title)}')">&#128465; Delete</button>
                </div>
              </div>
            </div>
          `).join('') : `<div style="grid-column:1/-1">${Components.emptyState('&#128196;', 'No Notices', 'No notices published yet.')}</div>`}
        </div>

        <div class="modal-overlay" id="noticeModal">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title" id="noticeModalTitle">Add Notice</h3>
              <button class="modal-close" onclick="Utils.hideModal('noticeModal')">&#10005;</button>
            </div>
            <div class="modal-body">
              <form id="noticeForm" onsubmit="saveNotice(event)">
                <input type="hidden" id="editNoticeId">
                <div class="form-group"><label class="form-label">Title <span class="required">*</span></label><input type="text" class="form-input" id="noticeTitle" required placeholder="Notice title"></div>
                <div class="grid grid-2" style="gap:12px">
                  <div class="form-group"><label class="form-label">Type</label>
                    <select class="form-input form-select" id="noticeType">
                      <option value="General">General</option>
                      <option value="Circular">Circular</option>
                      <option value="Seminar">Seminar</option>
                      <option value="Workshop">Workshop</option>
                      <option value="Placement">Placement</option>
                      <option value="Holiday">Holiday</option>
                      <option value="Event">Event</option>
                    </select>
                  </div>
                  <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="noticeDate"></div>
                </div>
                <div class="form-group"><label class="form-label">Description <span class="required">*</span></label><textarea class="form-input form-textarea" id="noticeDesc" rows="4" required placeholder="Notice description..."></textarea></div>
                <div class="form-group">
                  <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
                    <input type="checkbox" id="noticeImportant"> Mark as Important
                  </label>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="Utils.hideModal('noticeModal')">Cancel</button>
              <button class="btn btn-primary" onclick="document.getElementById('noticeForm').requestSubmit()">Publish</button>
            </div>
          </div>
        </div>
      `;
      loadPageContent(content);
    }

    function showAddNotice() {
      document.getElementById('noticeModalTitle').textContent = 'Add Notice';
      document.getElementById('editNoticeId').value = '';
      document.getElementById('noticeForm').reset();
      document.getElementById('noticeDate').value = new Date().toISOString().split('T')[0];
      Utils.showModal('noticeModal');
    }

    function editNotice(id) {
      const n = allNotices.find(x => x.id === id);
      if (!n) return;
      document.getElementById('noticeModalTitle').textContent = 'Edit Notice';
      document.getElementById('editNoticeId').value = id;
      document.getElementById('noticeTitle').value = n.title || '';
      document.getElementById('noticeType').value = n.type || 'General';
      document.getElementById('noticeDate').value = n.date || '';
      document.getElementById('noticeDesc').value = n.description || '';
      document.getElementById('noticeImportant').checked = n.important || false;
      Utils.showModal('noticeModal');
    }

    async function saveNotice(e) {
      e.preventDefault();
      const id = document.getElementById('editNoticeId').value;
      const data = {
        title: Utils.sanitize(document.getElementById('noticeTitle').value),
        type: document.getElementById('noticeType').value,
        date: document.getElementById('noticeDate').value || new Date().toISOString().split('T')[0],
        description: Utils.sanitize(document.getElementById('noticeDesc').value),
        important: document.getElementById('noticeImportant').checked,
        publishedBy: Auth.getCurrentUser()?.displayName || 'Faculty'
      };
      if (!data.title || !data.description) { Toast.warning('Required', 'Title and description are required'); return; }
      try {
        if (id) { await DB.update('notices', id, data); Toast.success('Updated', 'Notice updated'); }
        else { await DB.add('notices', data); Toast.success('Published', 'Notice published'); }
        Utils.hideModal('noticeModal');
        loadNotices();
      } catch (err) { Toast.error('Error', err.message); }
    }

    async function deleteNotice(id, title) {
      confirmDelete(`Delete notice "${title}"?`, async () => {
        try { await DB.remove('notices', id); Toast.success('Deleted', 'Notice removed'); loadNotices(); }
        catch (e) { Toast.error('Error', e.message); }
      });
    }

    function filterNotices(type) {
      activeFilter = type;
      filteredNotices = type ? allNotices.filter(n => n.type === type) : [...allNotices];
      renderPage();
    }
  </script>
</body>
</html>
