<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments - AI&DS SMS</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="/assets/firebase/config.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/toast.js"></script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/notifications.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    let departments = [];
    let academicYears = [];
    let semesters = [];
    let activeTab = 'departments';

    initDashboard('admin', 'departments');
    setTimeout(loadAll, 400);

    async function loadAll() {
      try {
        [departments, academicYears, semesters] = await Promise.all([
          DB.getAll('departments', [DB.orderBy('name', 'asc')]),
          DB.getAll('academicYears', [DB.orderBy('name', 'desc')]),
          DB.getAll('semesters', [DB.orderBy('name', 'asc')])
        ]);
      } catch (e) {
        departments = []; academicYears = []; semesters = [];
      }
      if (!departments.length) {
        departments = [{ id: 'default', name: 'AI & Data Science', code: 'AIDS', hod: '', studentCount: 0 }];
      }
      renderPage();
    }

    function renderPage() {
      const content = `
        ${Components.pageHeader('Departments & Academics', 'Manage departments, academic years, and semesters')}

        <div class="flex gap-2 mb-6" style="border-bottom:2px solid var(--border);padding-bottom:0">
          <button class="btn btn-sm ${activeTab === 'departments' ? 'btn-primary' : 'btn-ghost'}" onclick="switchTab('departments')" style="border-radius:var(--radius-sm) var(--radius-sm) 0 0">&#127979; Departments</button>
          <button class="btn btn-sm ${activeTab === 'years' ? 'btn-primary' : 'btn-ghost'}" onclick="switchTab('years')" style="border-radius:var(--radius-sm) var(--radius-sm) 0 0">&#128197; Academic Years</button>
          <button class="btn btn-sm ${activeTab === 'semesters' ? 'btn-primary' : 'btn-ghost'}" onclick="switchTab('semesters')" style="border-radius:var(--radius-sm) var(--radius-sm) 0 0">&#128198; Semesters</button>
        </div>

        ${activeTab === 'departments' ? renderDepartments() : ''}
        ${activeTab === 'years' ? renderAcademicYears() : ''}
        ${activeTab === 'semesters' ? renderSemesters() : ''}

        <div class="modal-overlay" id="deptModal">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title" id="deptModalTitle">Add Department</h3>
              <button class="modal-close" onclick="Utils.hideModal('deptModal')">&#10005;</button>
            </div>
            <div class="modal-body">
              <form id="deptForm" onsubmit="saveDept(event)">
                <input type="hidden" id="editDeptId">
                <div class="form-group"><label class="form-label">Department Name <span class="required">*</span></label><input type="text" class="form-input" id="deptName" required placeholder="e.g. AI & Data Science"></div>
                <div class="form-group"><label class="form-label">Department Code <span class="required">*</span></label><input type="text" class="form-input" id="deptCode" required placeholder="e.g. AIDS"></div>
                <div class="form-group"><label class="form-label">Head of Department</label><input type="text" class="form-input" id="deptHod" placeholder="HOD name"></div>
                <div class="form-group"><label class="form-label">Description</label><textarea class="form-input form-textarea" id="deptDesc" rows="2" placeholder="About the department"></textarea></div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="Utils.hideModal('deptModal')">Cancel</button>
              <button class="btn btn-primary" onclick="document.getElementById('deptForm').requestSubmit()">Save</button>
            </div>
          </div>
        </div>

        <div class="modal-overlay" id="yearModal">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title" id="yearModalTitle">Add Academic Year</h3>
              <button class="modal-close" onclick="Utils.hideModal('yearModal')">&#10005;</button>
            </div>
            <div class="modal-body">
              <form id="yearForm" onsubmit="saveYear(event)">
                <input type="hidden" id="editYearId">
                <div class="form-group"><label class="form-label">Year Name <span class="required">*</span></label><input type="text" class="form-input" id="yearName" required placeholder="e.g. 2025-2026"></div>
                <div class="grid grid-2" style="gap:12px">
                  <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="yearStart"></div>
                  <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-input" id="yearEnd"></div>
                </div>
                <div class="form-group"><label class="form-label">Status</label>
                  <select class="form-input form-select" id="yearStatus">
                    <option value="active">Active</option><option value="inactive">Inactive</option>
                  </select>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="Utils.hideModal('yearModal')">Cancel</button>
              <button class="btn btn-primary" onclick="document.getElementById('yearForm').requestSubmit()">Save</button>
            </div>
          </div>
        </div>

        <div class="modal-overlay" id="semModal">
          <div class="modal">
            <div class="modal-header">
              <h3 class="modal-title" id="semModalTitle">Add Semester</h3>
              <button class="modal-close" onclick="Utils.hideModal('semModal')">&#10005;</button>
            </div>
            <div class="modal-body">
              <form id="semForm" onsubmit="saveSem(event)">
                <input type="hidden" id="editSemId">
                <div class="form-group"><label class="form-label">Semester Name <span class="required">*</span></label><input type="text" class="form-input" id="semName" required placeholder="e.g. Semester 1"></div>
                <div class="grid grid-2" style="gap:12px">
                  <div class="form-group"><label class="form-label">Academic Year</label>
                    <select class="form-input form-select" id="semYear">
                      ${academicYears.map(y => `<option value="${y.id}">${Utils.escapeHtml(y.name)}</option>`).join('')}
                    </select>
                  </div>
                  <div class="form-group"><label class="form-label">Number</label><input type="number" class="form-input" id="semNumber" min="1" max="8" placeholder="e.g. 1"></div>
                </div>
                <div class="grid grid-2" style="gap:12px">
                  <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="semStart"></div>
                  <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-input" id="semEnd"></div>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="Utils.hideModal('semModal')">Cancel</button>
              <button class="btn btn-primary" onclick="document.getElementById('semForm').requestSubmit()">Save</button>
            </div>
          </div>
        </div>
      `;
      loadPageContent(content);
    }

    function renderDepartments() {
      return `
        <div class="flex items-center justify-between mb-4">
          <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold)">Departments</h3>
          <button class="btn btn-primary btn-sm" onclick="showAddDept()">+ Add Department</button>
        </div>
        <div class="grid grid-3" style="gap:20px">
          ${departments.length ? departments.map((d, i) => `
            <div class="card animate-fade-in-up" style="padding:0;overflow:hidden">
              <div style="height:8px;background:${['var(--gradient-primary)','var(--gradient-accent)','var(--gradient-success)','var(--gradient-purple)'][i % 4]}"></div>
              <div style="padding:24px">
                <div class="flex items-center gap-3 mb-4">
                  <div class="avatar avatar-placeholder" style="font-size:16px;background:var(--gradient-primary)">${d.code || 'DE'}</div>
                  <div>
                    <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold)">${Utils.escapeHtml(d.name)}</h3>
                    <p style="font-size:var(--font-size-xs);color:var(--text-secondary)">Code: ${Utils.escapeHtml(d.code || 'N/A')}</p>
                  </div>
                </div>
                ${d.hod ? `<p style="font-size:var(--font-size-sm);margin-bottom:8px"><strong>HOD:</strong> ${Utils.escapeHtml(d.hod)}</p>` : ''}
                ${d.description ? `<p style="font-size:var(--font-size-sm);color:var(--text-secondary);margin-bottom:12px">${Utils.escapeHtml(Utils.truncate(d.description, 100))}</p>` : ''}
                <div class="flex gap-2">
                  <button class="btn btn-ghost btn-sm" onclick="editDept('${d.id}')">&#9998; Edit</button>
                  ${d.id !== 'default' ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteDept('${d.id}','${Utils.escapeHtml(d.name)}')">&#128465; Delete</button>` : ''}
                </div>
              </div>
            </div>
          `).join('') : Components.emptyState('&#127979;', 'No Departments', 'No departments found.')}
        </div>
      `;
    }

    function renderAcademicYears() {
      return `
        <div class="flex items-center justify-between mb-4">
          <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold)">Academic Years</h3>
          <button class="btn btn-primary btn-sm" onclick="showAddYear()">+ Add Academic Year</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-container" style="border:none">
            <table class="table">
              <thead>
                <tr><th>Year</th><th>Start Date</th><th>End Date</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${academicYears.length ? academicYears.map(y => `
                  <tr>
                    <td style="font-weight:var(--font-medium)">${Utils.escapeHtml(y.name)}</td>
                    <td>${Utils.formatDate(y.startDate) || 'N/A'}</td>
                    <td>${Utils.formatDate(y.endDate) || 'N/A'}</td>
                    <td><span class="badge ${y.status === 'active' ? 'badge-success' : 'badge-danger'}">${Utils.capitalize(y.status || 'active')}</span></td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="editYear('${y.id}')">&#9998;</button>
                        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--danger)" onclick="deleteYear('${y.id}','${Utils.escapeHtml(y.name)}')">&#128465;</button>
                      </div>
                    </td>
                  </tr>
                `).join('') : `<tr><td colspan="5">${Components.emptyState('&#128197;', 'No Academic Years', 'Add an academic year to begin.')}</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderSemesters() {
      return `
        <div class="flex items-center justify-between mb-4">
          <h3 style="font-size:var(--font-size-base);font-weight:var(--font-semibold)">Semesters</h3>
          <button class="btn btn-primary btn-sm" onclick="showAddSem()">+ Add Semester</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-container" style="border:none">
            <table class="table">
              <thead>
                <tr><th>Semester</th><th>Number</th><th>Academic Year</th><th>Start Date</th><th>End Date</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${semesters.length ? semesters.map(s => `
                  <tr>
                    <td style="font-weight:var(--font-medium)">${Utils.escapeHtml(s.name)}</td>
                    <td><span class="badge badge-primary">${s.number || 'N/A'}</span></td>
                    <td>${(() => { const y = academicYears.find(a => a.id === s.academicYearId); return y ? Utils.escapeHtml(y.name) : 'N/A'; })()}</td>
                    <td>${Utils.formatDate(s.startDate) || 'N/A'}</td>
                    <td>${Utils.formatDate(s.endDate) || 'N/A'}</td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="editSem('${s.id}')">&#9998;</button>
                        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--danger)" onclick="deleteSem('${s.id}','${Utils.escapeHtml(s.name)}')">&#128465;</button>
                      </div>
                    </td>
                  </tr>
                `).join('') : `<tr><td colspan="6">${Components.emptyState('&#128198;', 'No Semesters', 'Add a semester to begin.')}</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function switchTab(tab) { activeTab = tab; renderPage(); }

    // Department CRUD
    function showAddDept() {
      document.getElementById('deptModalTitle').textContent = 'Add Department';
      document.getElementById('editDeptId').value = '';
      document.getElementById('deptForm').reset();
      Utils.showModal('deptModal');
    }
    function editDept(id) {
      const d = departments.find(x => x.id === id);
      if (!d) return;
      document.getElementById('deptModalTitle').textContent = 'Edit Department';
      document.getElementById('editDeptId').value = id;
      document.getElementById('deptName').value = d.name || '';
      document.getElementById('deptCode').value = d.code || '';
      document.getElementById('deptHod').value = d.hod || '';
      document.getElementById('deptDesc').value = d.description || '';
      Utils.showModal('deptModal');
    }
    async function saveDept(e) {
      e.preventDefault();
      const id = document.getElementById('editDeptId').value;
      const data = {
        name: Utils.sanitize(document.getElementById('deptName').value),
        code: document.getElementById('deptCode').value.trim().toUpperCase(),
        hod: Utils.sanitize(document.getElementById('deptHod').value),
        description: Utils.sanitize(document.getElementById('deptDesc').value)
      };
      if (!data.name || !data.code) { Toast.warning('Required', 'Name and code are required'); return; }
      try {
        if (id && id !== 'default') { await DB.update('departments', id, data); Toast.success('Updated', 'Department updated'); }
        else if (id === 'default') { await DB.set('departments', 'default', data); Toast.success('Updated', 'Department updated'); }
        else { await DB.add('departments', data); Toast.success('Added', 'Department added'); }
        Utils.hideModal('deptModal');
        loadAll();
      } catch (err) { Toast.error('Error', err.message); }
    }
    async function deleteDept(id, name) {
      confirmDelete(`Delete department "${name}"?`, async () => {
        try { await DB.remove('departments', id); Toast.success('Deleted', 'Department removed'); loadAll(); }
        catch (e) { Toast.error('Error', e.message); }
      });
    }

    // Academic Year CRUD
    function showAddYear() {
      document.getElementById('yearModalTitle').textContent = 'Add Academic Year';
      document.getElementById('editYearId').value = '';
      document.getElementById('yearForm').reset();
      Utils.showModal('yearModal');
    }
    function editYear(id) {
      const y = academicYears.find(x => x.id === id);
      if (!y) return;
      document.getElementById('yearModalTitle').textContent = 'Edit Academic Year';
      document.getElementById('editYearId').value = id;
      document.getElementById('yearName').value = y.name || '';
      document.getElementById('yearStart').value = y.startDate || '';
      document.getElementById('yearEnd').value = y.endDate || '';
      document.getElementById('yearStatus').value = y.status || 'active';
      Utils.showModal('yearModal');
    }
    async function saveYear(e) {
      e.preventDefault();
      const id = document.getElementById('editYearId').value;
      const data = {
        name: Utils.sanitize(document.getElementById('yearName').value),
        startDate: document.getElementById('yearStart').value,
        endDate: document.getElementById('yearEnd').value,
        status: document.getElementById('yearStatus').value
      };
      if (!data.name) { Toast.warning('Required', 'Year name is required'); return; }
      try {
        if (id) { await DB.update('academicYears', id, data); Toast.success('Updated', 'Academic year updated'); }
        else { await DB.add('academicYears', data); Toast.success('Added', 'Academic year added'); }
        Utils.hideModal('yearModal');
        loadAll();
      } catch (err) { Toast.error('Error', err.message); }
    }
    async function deleteYear(id, name) {
      confirmDelete(`Delete academic year "${name}"?`, async () => {
        try { await DB.remove('academicYears', id); Toast.success('Deleted', 'Academic year removed'); loadAll(); }
        catch (e) { Toast.error('Error', e.message); }
      });
    }

    // Semester CRUD
    function showAddSem() {
      document.getElementById('semModalTitle').textContent = 'Add Semester';
      document.getElementById('editSemId').value = '';
      document.getElementById('semForm').reset();
      Utils.showModal('semModal');
    }
    function editSem(id) {
      const s = semesters.find(x => x.id === id);
      if (!s) return;
      document.getElementById('semModalTitle').textContent = 'Edit Semester';
      document.getElementById('editSemId').value = id;
      document.getElementById('semName').value = s.name || '';
      document.getElementById('semYear').value = s.academicYearId || '';
      document.getElementById('semNumber').value = s.number || '';
      document.getElementById('semStart').value = s.startDate || '';
      document.getElementById('semEnd').value = s.endDate || '';
      Utils.showModal('semModal');
    }
    async function saveSem(e) {
      e.preventDefault();
      const id = document.getElementById('editSemId').value;
      const data = {
        name: Utils.sanitize(document.getElementById('semName').value),
        academicYearId: document.getElementById('semYear').value,
        number: parseInt(document.getElementById('semNumber').value) || 0,
        startDate: document.getElementById('semStart').value,
        endDate: document.getElementById('semEnd').value
      };
      if (!data.name) { Toast.warning('Required', 'Semester name is required'); return; }
      try {
        if (id) { await DB.update('semesters', id, data); Toast.success('Updated', 'Semester updated'); }
        else { await DB.add('semesters', data); Toast.success('Added', 'Semester added'); }
        Utils.hideModal('semModal');
        loadAll();
      } catch (err) { Toast.error('Error', err.message); }
    }
    async function deleteSem(id, name) {
      confirmDelete(`Delete semester "${name}"?`, async () => {
        try { await DB.remove('semesters', id); Toast.success('Deleted', 'Semester removed'); loadAll(); }
        catch (e) { Toast.error('Error', e.message); }
      });
    }
  </script>
</body>
</html>
